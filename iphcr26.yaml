esphome:
  name: fairland-heatpump
  friendly_name: Fairland Heatpump
  platformio_options:
    upload_speed: 115200

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"

mqtt:
  broker: 192.168.X.X
  username: "mqtt_user"
  password: "mqtt_password"
  
logger:
  level: INFO

uart:
  id: mod_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  stop_bits: 1

modbus:
  id: modbus1
  uart_id: mod_bus

modbus_controller:
  - id: fairland
    address: 1
    modbus_id: modbus1
    update_interval: 60s

# ==========================================
# MAIN SWITCH (Coil)
# ==========================================
switch:
  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_power"
    id: fairland_power
    register_type: coil
    address: 0

# ==========================================
# MODE SELECTION REGISTERS (Holding)
# ==========================================
select:
  - platform: modbus_controller
    name: "fairland_operating_mode"
    modbus_controller_id: fairland
    id: fairland_operating_mode
    address: 0
    value_type: U_WORD
    optionsmap:
      "Auto": 0
      "Grzanie": 1
      "Chłodzenie": 2

  - platform: modbus_controller
    name: "fairland_power_mode"
    modbus_controller_id: fairland
    id: fairland_power_mode
    address: 1
    value_type: U_WORD
    optionsmap:
      "Normalny (Smart)": 0
      "Silence": 1
      "Super Silence": 2
      "Turbo": 3

# ==========================================
# THREE TEMPERATURE SETTING MODES (Holding)
# ==========================================
number:
  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_target_temp_auto"
    id: fairland_target_temp_auto
    address: 2
    value_type: U_WORD
    unit_of_measurement: "°C"
    min_value: 18
    max_value: 40
    lambda: "return (x-96) / 2.0 + 18.0;"
    write_lambda: "return ((x-18.0) * 2.0 + 96.0);"

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_target_temp_heat"
    id: fairland_target_temp_heat
    address: 3
    value_type: U_WORD
    unit_of_measurement: "°C"
    min_value: 18
    max_value: 40
    lambda: "return (x-96) / 2.0 + 18.0;"
    write_lambda: "return ((x-18.0) * 2.0 + 96.0);"

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_target_temp_cool"
    id: fairland_target_temp_cool
    address: 4
    value_type: U_WORD
    unit_of_measurement: "°C"
    min_value: 18
    max_value: 40
    lambda: "return (x-96) / 2.0 + 18.0;"
    write_lambda: "return ((x-18.0) * 2.0 + 96.0);"

# ==========================================
# MEASUREMENT AND DIAGNOSTIC SENSORS (Input)
# ==========================================
sensor:
  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_temp_inlet"
    id: fairland_temp_inlet
    register_type: read
    address: 3
    value_type: U_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - offset: -96
      - multiply: 0.5
      - offset: 18

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_temp_outlet"
    id: fairland_temp_outlet
    register_type: read
    address: 4
    value_type: U_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - offset: -96
      - multiply: 0.5
      - offset: 18

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_outside"
    id: fairland_outside
    register_type: read
    address: 5
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_pomp"
    id: fairland_pomp
    register_type: read
    address: 0
    value_type: U_WORD
    unit_of_measurement: "%"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_current"
    id: fairland_current
    register_type: read
    address: 11
    value_type: U_WORD
    unit_of_measurement: "A"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_pfc_voltage"
    id: fairland_pfc_voltage
    register_type: read
    address: 2
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 0

  # MATHEMATICAL POWER CALCULATION (W)
  - platform: template
    name: "fairland_power_w"
    id: fairland_power_w
    unit_of_measurement: "W"
    accuracy_decimals: 0
    lambda: |-
      if (id(fairland_current).state && id(fairland_pfc_voltage).state) {
        return id(fairland_current).state * id(fairland_pfc_voltage).state;
      } else {
        return 0.0;
      }
    update_interval: 60s

# ==========================================
# BINARY ERROR SENSORS (Discrete Input)
# ==========================================
binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_E1"
    register_type: discrete_input
    address: 49
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_E2"
    register_type: discrete_input
    address: 50
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_E3"
    register_type: discrete_input
    address: 51
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_E6"
    register_type: discrete_input
    address: 54
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_E7"
    register_type: discrete_input
    address: 55
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_E8"
    register_type: discrete_input
    address: 56
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_F1"
    register_type: discrete_input
    address: 81
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_F3"
    register_type: discrete_input
    address: 83
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_F4"
    register_type: discrete_input
    address: 84
    device_class: problem

  - platform: modbus_controller
    modbus_controller_id: fairland
    name: "fairland_error_F9"
    register_type: discrete_input
    address: 89
    device_class: problem
